<div class="register-container">
  <div class="register-card">
    <h2>Register</h2>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm your password" />
    </div>

    <button (click)="register()">Register</button>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Login</a>
    </p>

    <p class="back-link">
      <a routerLink="/welcome">← Back</a>
    </p>
  </div>
</div>
